<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ANON ARCHIVE — обновление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            background-image: radial-gradient(ellipse at 20% 30%, #0f1a1a 0%, #000000 80%);
            color: #f0f0f0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }
        .container {
            max-width: 700px;
            animation: fadeInUp 0.8s ease;
        }
        .logo {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 30%, #7dd5c0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
            margin-bottom: 0.5rem;
        }
        .icon {
            font-size: 5rem;
            margin-bottom: 1.2rem;
            display: block;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #e8edf5;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #8899bb;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }
        .status-box {
            background: rgba(14, 20, 40, 0.6);
            border: 1px solid rgba(46, 125, 100, 0.15);
            border-radius: 16px;
            padding: 1.5rem;
            margin: 2rem 0;
            backdrop-filter: blur(8px);
        }
        .status-box .label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7dd5c0;
            font-weight: 600;
        }
        .status-box p {
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #a0b0c0;
        }
        .footer {
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #445566;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 700px) {
            .logo { font-size: 2.8rem; }
            .icon { font-size: 3.5rem; }
            h1 { font-size: 1.8rem; }
            .subtitle { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">🔄</span>
        <div class="logo">ANON ARCHIVE</div>
        <h1>Идёт глобальное обновление</h1>
        <div class="subtitle">
            Мы перерабатываем дизайн, добавляем новые разделы<br>
            и интерактивные инструменты.
        </div>
        <div class="status-box">
            <div class="label">🚀 v2.0 скоро здесь</div>
            <p>Новая версия будет готова через несколько минут.<br>Спасибо за понимание.</p>
        </div>
        <div class="footer">
            <p>ANON ARCHIVE — гайд по анонимности</p>
        </div>
    </div>
</body>
</html>
